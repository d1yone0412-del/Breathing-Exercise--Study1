<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breathing Exercise · 45 Seconds</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap');

  :root {
    --sky: #b8d4e8; --deep: #1a2e3d;
    --mist: #dce9f2; --sage: #7aab9a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: linear-gradient(160deg, #0d1e2b 0%, #1a3348 40%, #0f2233 100%);
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    font-family:'Jost',sans-serif; color:var(--mist);
    overflow:hidden; position:relative;
  }

  .bg-layer { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .star {
    position:absolute; border-radius:50%;
    background:rgba(184,212,232,0.15);
    animation:drift linear infinite;
  }
  @keyframes drift {
    0%   { transform:translateY(0) scale(1); opacity:0; }
    10%  { opacity:1; }
    90%  { opacity:0.6; }
    100% { transform:translateY(-100vh) scale(0.6); opacity:0; }
  }

  .container {
    position:relative; z-index:2;
    display:flex; flex-direction:column;
    align-items:center; gap:28px;
    padding:40px 24px; max-width:480px; width:100%;
  }

  .header { text-align:center; }
  .badge {
    display:inline-block;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(184,212,232,0.3);
    border-radius:20px; padding:4px 14px;
    font-size:10px; letter-spacing:2.5px;
    text-transform:uppercase; color:var(--sky); margin-bottom:12px;
  }
  h1 {
    font-family:'Cormorant Garamond',serif; font-weight:300;
    font-size:clamp(28px,6vw,38px); color:var(--mist);
    letter-spacing:1px; line-height:1.2;
  }
  h1 em { font-style:italic; color:var(--sky); }
  .subtitle {
    margin-top:8px; font-size:12px; letter-spacing:1.5px;
    color:rgba(184,212,232,0.6); text-transform:uppercase;
  }

  .orb-wrapper {
    position:relative; width:220px; height:220px;
    display:flex; align-items:center; justify-content:center;
  }
  .orb-ring {
    position:absolute; border-radius:50%;
    border:1px solid rgba(184,212,232,0.15);
    animation:ring-pulse 4s ease-in-out infinite;
  }
  .orb-ring:nth-child(1) { width:100%; height:100%; animation-delay:0s; }
  .orb-ring:nth-child(2) { width:80%; height:80%; animation-delay:0.5s; }
  @keyframes ring-pulse {
    0%,100% { opacity:0.15; transform:scale(1); }
    50% { opacity:0.4; transform:scale(1.05); }
  }

  .orb {
    width:140px; height:140px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%,
      rgba(184,212,232,0.9), rgba(122,171,154,0.6) 40%, rgba(26,51,72,0.8) 100%);
    box-shadow:0 0 40px rgba(184,212,232,0.3),0 0 80px rgba(122,171,154,0.15),inset 0 0 30px rgba(255,255,255,0.1);
    position:relative;
  }
  .orb::after {
    content:''; position:absolute;
    top:18%; left:22%; width:28%; height:20%;
    background:rgba(255,255,255,0.35);
    border-radius:50%; filter:blur(4px); transform:rotate(-30deg);
  }
  .orb.inhale { animation:orb-inhale 5s ease-in-out forwards; }
  .orb.exhale { animation:orb-exhale 5s ease-in-out forwards; }
  @keyframes orb-inhale {
    from { transform:scale(1); box-shadow:0 0 40px rgba(184,212,232,0.3),0 0 80px rgba(122,171,154,0.15),inset 0 0 30px rgba(255,255,255,0.1); }
    to   { transform:scale(1.35); box-shadow:0 0 60px rgba(184,212,232,0.5),0 0 120px rgba(122,171,154,0.3),inset 0 0 40px rgba(255,255,255,0.15); }
  }
  @keyframes orb-exhale {
    from { transform:scale(1.35); box-shadow:0 0 60px rgba(184,212,232,0.5),0 0 120px rgba(122,171,154,0.3),inset 0 0 40px rgba(255,255,255,0.15); }
    to   { transform:scale(1); box-shadow:0 0 40px rgba(184,212,232,0.3),0 0 80px rgba(122,171,154,0.15),inset 0 0 30px rgba(255,255,255,0.1); }
  }

  .phase-label {
    position:absolute; bottom:-28px; left:50%; transform:translateX(-50%);
    font-family:'Cormorant Garamond',serif; font-size:13px;
    letter-spacing:3px; text-transform:uppercase;
    color:rgba(184,212,232,0.8); white-space:nowrap;
  }

  .count-display {
    font-family:'Cormorant Garamond',serif; font-size:72px;
    font-weight:300; color:var(--mist); line-height:1;
    letter-spacing:-2px; min-height:80px;
    display:flex; align-items:center; justify-content:center;
    text-shadow:0 0 30px rgba(184,212,232,0.5); transition:color 0.5s;
  }
  .breath-cue {
    font-family:'Cormorant Garamond',serif; font-size:14px;
    letter-spacing:2px; color:rgba(184,212,232,0.5);
    text-transform:uppercase; height:20px; text-align:center;
  }

  .progress-track {
    width:100%; height:2px;
    background:rgba(184,212,232,0.1); border-radius:1px; overflow:hidden;
  }
  .progress-fill {
    height:100%; background:linear-gradient(90deg,var(--sage),var(--sky));
    border-radius:1px; width:0%; transition:width 1s linear;
  }

  .instruction {
    background:rgba(184,212,232,0.05); border:1px solid rgba(184,212,232,0.12);
    border-radius:16px; padding:18px 22px; text-align:center;
    min-height:68px; display:flex; align-items:center; justify-content:center;
  }
  .instruction p {
    font-family:'Cormorant Garamond',serif; font-size:17px;
    font-weight:300; font-style:italic; color:var(--mist);
    line-height:1.5; letter-spacing:0.3px;
  }

  .controls { display:flex; gap:12px; align-items:center; }
  .btn-start {
    background:linear-gradient(135deg,rgba(122,171,154,0.8),rgba(184,212,232,0.7));
    border:none; border-radius:50px; padding:14px 42px;
    font-family:'Jost',sans-serif; font-size:13px; font-weight:300;
    letter-spacing:3px; text-transform:uppercase; color:var(--deep);
    cursor:pointer; transition:all 0.3s ease;
    box-shadow:0 4px 20px rgba(122,171,154,0.3);
  }
  .btn-start:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(122,171,154,0.4); }
  .btn-start:active { transform:translateY(0); }
  .btn-start:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
  .btn-reset {
    background:transparent; border:1px solid rgba(184,212,232,0.25);
    border-radius:50px; padding:14px 24px;
    font-family:'Jost',sans-serif; font-size:12px; letter-spacing:2px;
    text-transform:uppercase; color:rgba(184,212,232,0.6);
    cursor:pointer; transition:all 0.3s; display:none;
  }
  .btn-reset:hover { border-color:rgba(184,212,232,0.5); color:var(--mist); }

  .timer {
    font-size:11px; letter-spacing:2px;
    color:rgba(184,212,232,0.4); text-transform:uppercase; font-weight:300;
  }

  .complete-msg {
    display:none; flex-direction:column; align-items:center; gap:8px;
    animation:fadeIn 1s ease forwards;
  }
  .complete-msg h2 {
    font-family:'Cormorant Garamond',serif; font-size:28px;
    font-weight:300; color:var(--sky); letter-spacing:1px;
  }
  .complete-msg p {
    font-size:13px; color:rgba(184,212,232,0.6); letter-spacing:1px; text-align:center;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

  .wellbeing-note {
    font-size:11px; color:rgba(184,212,232,0.35); text-align:center;
    letter-spacing:0.5px; line-height:1.6; max-width:340px; padding:0 12px;
  }
</style>
</head>
<body>

<div class="bg-layer" id="bgLayer"></div>

<div class="container">
  <div class="header">
    <h1>Breathing <em>Exercise</em></h1>
    <p class="subtitle" id="subtitle">45 seconds · inhale 5s · exhale 5s</p>
  </div>

  <div class="orb-wrapper">
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb" id="orb"></div>
    <div class="phase-label" id="phaseLabel">Ready?</div>
  </div>

  <div class="count-display" id="countDisplay">—</div>

  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="pre-instruction" id="preInstruction">
    Breathe in for 5 · Breathe out for 5 · Follow the circle
  </div>

  <div class="controls">
    <button class="btn-start" id="btnStart" onclick="startExercise()">Begin</button>
    <button class="btn-reset" id="btnReset" onclick="resetExercise()">Reset</button>
  </div>

  <div class="complete-msg" id="completeMsg">
    <h2>✦ Complete</h2>
    <p>Please close this tab and return to the survey</p>
  </div>

</div>

<script>
// ── Ambient particles ──
(function(){
  const layer = document.getElementById('bgLayer');
  for(let i=0;i<28;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*3+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*120}%;animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*10}s;`;
    layer.appendChild(s);
  }
})();

// ══════════════════════════════════════════════════════════
//  GENERATIVE AMBIENT MUSIC ENGINE  (Web Audio API)
//  Layers:
//  1. Low drone — 55 Hz sine with slow LFO tremolo
//  2. Pad chords — Am pentatonic, slow attack/release
//  3. Singing bowl tones — sparse, meditative
//  4. High shimmer — occasional high sine sparkles
//  5. Breath cue chimes — soft two-note cue on each phase
// ══════════════════════════════════════════════════════════

let AC = null;   // AudioContext
let masterGain = null;
let reverbNode = null;
let reverbGain = null;
let dryGain = null;
let musicActive = false;

function buildReverb(ctx, seconds, decay) {
  const rate = ctx.sampleRate;
  const len = Math.floor(rate * seconds);
  const buf = ctx.createBuffer(2, len, rate);
  for (let c=0; c<2; c++) {
    const d = buf.getChannelData(c);
    for (let i=0; i<len; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, decay);
  }
  return buf;
}

function wire(node) {
  // connect a node to both dry and reverb buses
  if (dryGain)   node.connect(dryGain);
  if (reverbGain) node.connect(reverbGain);
}

function initAudio() {
  AC = new (window.AudioContext || window.webkitAudioContext)();
  musicActive = true;

  // Master
  masterGain = AC.createGain();
  masterGain.gain.setValueAtTime(0, AC.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.75, AC.currentTime + 5);
  masterGain.connect(AC.destination);

  // Reverb
  const conv = AC.createConvolver();
  conv.buffer = buildReverb(AC, 4, 1.8);
  reverbNode = conv;

  reverbGain = AC.createGain();
  reverbGain.gain.value = 0.52;
  reverbGain.connect(conv);
  conv.connect(masterGain);

  dryGain = AC.createGain();
  dryGain.gain.value = 0.48;
  dryGain.connect(masterGain);

  launchDrone();
  launchPads();
  launchBowls();
  launchShimmer();
}

// 1. Drone — sub-bass A (55 Hz), very quiet, slow wobble
function launchDrone() {
  const osc = AC.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 55;

  const g = AC.createGain();
  g.gain.value = 0.10;

  const lfo = AC.createOscillator();
  lfo.frequency.value = 0.05;
  const lg = AC.createGain();
  lg.gain.value = 0.03;
  lfo.connect(lg); lg.connect(g.gain);
  lfo.start();

  osc.connect(g); wire(g);
  osc.start();
}

// 2. Pad chords — slow, warm, cycling Am pentatonic voicings
const PAD_CHORDS = [
  [110, 130.81, 164.81, 196.00],  // Am
  [98.00, 123.47, 146.83, 184.99],// Gsus2
  [110, 138.59, 164.81, 220.00],  // Am (octave)
  [116.54, 146.83, 174.61, 220.00]// Bbmaj7~
];
let padIdx = 0;

function launchPads() {
  if (!musicActive) return;
  const chord = PAD_CHORDS[padIdx++ % PAD_CHORDS.length];
  const now = AC.currentTime;

  chord.forEach((freq, i) => {
    // two slightly detuned oscillators for warmth
    [1, 1.0035].forEach(detune => {
      const osc = AC.createOscillator();
      osc.type = i < 2 ? 'sine' : 'triangle';
      osc.frequency.value = freq * detune;

      // very slow vibrato
      const vib = AC.createOscillator();
      vib.frequency.value = 4 + Math.random() * 0.8;
      const vg = AC.createGain(); vg.gain.value = 0.3;
      vib.connect(vg); vg.connect(osc.frequency);
      vib.start(now); vib.stop(now + 12);

      const env = AC.createGain();
      env.gain.setValueAtTime(0, now);
      env.gain.linearRampToValueAtTime((0.065 - i*0.01), now + 3.0);
      env.gain.setValueAtTime((0.065 - i*0.01), now + 7.5);
      env.gain.linearRampToValueAtTime(0, now + 11.5);

      osc.connect(env); wire(env);
      osc.start(now); osc.stop(now + 12.5);
    });
  });

  setTimeout(() => { if(musicActive) launchPads(); }, 9200);
}

// 3. Singing bowls — sparse meditative tones
// A minor pentatonic: A C D E G across two octaves
const BOWL_FREQS = [110, 130.81, 146.83, 164.81, 196, 220, 261.63, 293.66, 329.63, 392];

function launchBowls() {
  if (!musicActive) return;
  const freq = BOWL_FREQS[Math.floor(Math.random() * BOWL_FREQS.length)];
  const now = AC.currentTime;

  // Fundamental
  const osc = AC.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq * 1.008, now);
  osc.frequency.exponentialRampToValueAtTime(freq, now + 0.25);

  const env = AC.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(0.085, now + 0.04);
  env.gain.exponentialRampToValueAtTime(0.0001, now + 4.5);

  // Inharmonic partial (bowl ring)
  const osc2 = AC.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2.73;
  const env2 = AC.createGain();
  env2.gain.setValueAtTime(0, now);
  env2.gain.linearRampToValueAtTime(0.022, now + 0.03);
  env2.gain.exponentialRampToValueAtTime(0.0001, now + 2.0);
  osc2.connect(env2); env2.connect(reverbGain);
  osc2.start(now); osc2.stop(now + 2.5);

  osc.connect(env); env.connect(reverbGain);
  osc.start(now); osc.stop(now + 5.5);

  const next = 3500 + Math.random() * 5000;
  setTimeout(() => { if(musicActive) launchBowls(); }, next);
}

// 4. Shimmer — gentle high-frequency sparkles
function launchShimmer() {
  if (!musicActive) return;
  const freq = 880 + Math.random() * 1540;
  const now = AC.currentTime;

  const osc = AC.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = freq;

  const env = AC.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(0.012, now + 0.3);
  env.gain.exponentialRampToValueAtTime(0.0001, now + 2.8);

  osc.connect(env); env.connect(reverbGain);
  osc.start(now); osc.stop(now + 3.2);

  setTimeout(() => { if(musicActive) launchShimmer(); }, 1800 + Math.random() * 3000);
}

// 5. Breath cue chime — soft two-note signal at each phase change
function playBreathChime(type) {
  if (!AC || !musicActive) return;
  const now = AC.currentTime;
  const pairs = type === 'inhale' ? [[329.63, 440]] : [[440, 329.63]];

  pairs[0].forEach(([f1, f2]) => {
    [[f1, 0], [f2, 0.22]].forEach(([f, delay]) => {
      const osc = AC.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = f;
      const env = AC.createGain();
      const t = now + delay;
      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(0.07, t + 0.07);
      env.gain.exponentialRampToValueAtTime(0.0001, t + 1.4);
      osc.connect(env); env.connect(reverbGain);
      osc.start(t); osc.stop(t + 1.8);
    });
  });
}

function stopMusic(fade = 3) {
  if (!AC || !masterGain) return;
  musicActive = false;
  try {
    masterGain.gain.linearRampToValueAtTime(0, AC.currentTime + fade);
    setTimeout(() => { try { AC.close(); } catch(e){} AC = null; }, (fade + 0.5) * 1000);
  } catch(e) {}
}

// ══════════════════════════════════════════════════════════
//  BREATHING ENGINE  +  QUALTRICS postMessage TRACKING
// ══════════════════════════════════════════════════════════
const TOTAL = 45;
let elapsed = 0, running = false;
let masterInterval = null, countInterval = null;

// ── Tracking state ──
let pageOpenTime = Date.now();   // when the page was loaded
let exerciseStartTime = null;    // when Begin was clicked

// Send event to Qualtrics (or any parent frame)
function toQualtrics(eventName, payload) {
  const msg = { source: 'breathingExercise', event: eventName, ...payload };
  try { window.parent.postMessage(JSON.stringify(msg), '*'); } catch(e){}
  // also log locally for debugging
  console.log('[Breathing →]', msg);
}

// Report page-open immediately
toQualtrics('pageLoaded', { timestamp: new Date().toISOString() });

// Report if user closes/navigates away mid-exercise
window.addEventListener('beforeunload', () => {
  if (running) {
    toQualtrics('abandoned', {
      secondsElapsed: elapsed,
      exerciseDuration: elapsed
    });
  }
});

const orb          = document.getElementById('orb');
const phaseLabel   = document.getElementById('phaseLabel');
const countDisp    = document.getElementById('countDisplay');
const progressFill = document.getElementById('progressFill');
const btnStart     = document.getElementById('btnStart');
const btnReset     = document.getElementById('btnReset');
const completeMsg  = document.getElementById('completeMsg');

// 45s = 5s prep + 4 cycles × 10s + 5s complete
const PHASES = [
  [0,  5,  'prep',    'Get ready', ''],
  [5,  5,  'inhale',  'Breathe In',  ''],
  [10, 5,  'exhale',  'Breathe Out', ''],
  [15, 5,  'inhale',  'Breathe In',  ''],
  [20, 5,  'exhale',  'Breathe Out', ''],
  [25, 5,  'inhale',  'Breathe In',  ''],
  [30, 5,  'exhale',  'Breathe Out', ''],
  [35, 5,  'inhale',  'Breathe In',  ''],
  [40, 5,  'exhale',  'Breathe Out', ''],
  [45, 5,  'complete','',            ''],
];

let phaseIdx = -1;

function setOrbPhase(p) {
  orb.classList.remove('inhale','exhale');
  void orb.offsetWidth;
  if(p==='inhale') orb.classList.add('inhale');
  else if(p==='exhale') orb.classList.add('exhale');
}

function startCountTick() {
  let c=1; countDisp.textContent=c;
  if(countInterval) clearInterval(countInterval);
  countInterval = setInterval(()=>{
    c++;
    if(c<=5) countDisp.textContent=c;
    if(c>=5) clearInterval(countInterval);
  }, 1000);
}

function triggerPhase(phase) {
  const [,, type, label] = phase;
  phaseLabel.textContent = label;

  if(type==='prep') {
    countDisp.textContent='—';
    orb.classList.remove('inhale','exhale');

  } else if(type==='inhale') {
    setOrbPhase('inhale');
    countDisp.style.color='#b8d4e8';
    playBreathChime('inhale');
    setTimeout(startCountTick, 700);

  } else if(type==='exhale') {
    setOrbPhase('exhale');
    countDisp.style.color='#7aab9a';
    playBreathChime('exhale');
    setTimeout(startCountTick, 700);

  } else if(type==='complete') {
    finishExercise();
  }
}

function checkPhase(sec) {
  for(let i=PHASES.length-1; i>=0; i--) {
    if(sec >= PHASES[i][0]) {
      if(i!==phaseIdx) { phaseIdx=i; triggerPhase(PHASES[i]); }
      break;
    }
  }
}

function startExercise() {
  if(running) return;
  running=true; elapsed=0; phaseIdx=-1;
  exerciseStartTime = Date.now();
  btnStart.disabled=true;
  btnReset.style.display='inline-block';
  completeMsg.style.display='none';
  document.getElementById('preInstruction').style.display='none';
  document.getElementById('subtitle').style.display='none';

  // ── Notify Qualtrics: exercise started ──
  toQualtrics('exerciseStarted', {
    timestamp: new Date().toISOString(),
    secondsSincePageLoad: Math.round((Date.now() - pageOpenTime) / 1000)
  });

  initAudio();

  masterInterval = setInterval(()=>{
    elapsed++;
    progressFill.style.width=(elapsed/TOTAL*100)+'%';
    checkPhase(elapsed);
    if(elapsed>=TOTAL) clearInterval(masterInterval);
  }, 1000);

  checkPhase(0);
}

function finishExercise() {
  running=false;
  if(countInterval) clearInterval(countInterval);
  orb.classList.remove('inhale','exhale');
  countDisp.textContent='✦'; countDisp.style.color='#b8d4e8';
  phaseLabel.textContent='';
  completeMsg.style.display='flex';
  btnStart.textContent='Begin Again'; btnStart.disabled=false;

  toQualtrics('exerciseCompleted', {
    timestamp: new Date().toISOString(),
    totalDurationSeconds: TOTAL,
    completed: true
  });

  setTimeout(()=>stopMusic(4), 2000);
}

function resetExercise() {
  running=false;
  if(masterInterval) clearInterval(masterInterval);
  if(countInterval) clearInterval(countInterval);

  if(elapsed > 0) {
    toQualtrics('exerciseReset', {
      secondsCompleted: elapsed,
      completed: false
    });
  }

  stopMusic(1.5);
  elapsed=0; phaseIdx=-1;
  progressFill.style.width='0%';
  countDisp.textContent='—'; countDisp.style.color='var(--mist)';
  phaseLabel.textContent='Ready?';
  orb.classList.remove('inhale','exhale');
  completeMsg.style.display='none';
  document.getElementById('preInstruction').style.display='block';
  document.getElementById('subtitle').style.display='block';
  btnStart.textContent='Begin'; btnStart.disabled=false;
  btnReset.style.display='none';
}
</script>
